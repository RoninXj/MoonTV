name: Upstream Sync

on:
  schedule:
    - cron: "0 */6 * * *" # 每6小时运行一次
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # 步骤1: 检出目标仓库
      - name: Checkout target repo
        uses: actions/checkout@v4

      # 步骤2: 同步上游更改
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: LunaTechLab/MoonTV
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}

      # 步骤3: 移除同步过来的public文件夹内容
      - name: Remove public folder contents from sync
        if: steps.sync.outputs.has_new_commits == 'true'
        run: |
          # 检查public文件夹是否存在
          if [ -d "public" ]; then
            # 清空public文件夹但保留文件夹本身
            rm -rf public/*
            # 如果需要保留某些文件，可以在这里添加例外
            # 例如: mkdir -p public/assets && touch public/assets/.gitkeep
            
            # 提交更改
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add public/
            git commit -m "Remove public folder contents after upstream sync"
            git push
          fi

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库工作流文件的更改，GitHub已自动暂停定时更新。请手动同步你的分支。"
          exit 1

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
    
